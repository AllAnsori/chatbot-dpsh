<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATABOT</title>

<style>
body {
    font-family: Arial;
    background: #white;
}

.chat-box {
    width: 100%;
    max-width: 400px;
    margin: auto;
    background: #d1d4d9;
    padding: 10px;
    height: 500px;
    overflow-y: auto;
    border-radius: 10px;
}

.bot, .user {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    max-width: 70%;
}

.bot {
    background: white;
}

.user {
    background: #c2a057;
    margin-left: auto;
    text-align: right;
}

.container {
    display: flex;
    flex-direction: column;
}

.buttons {
    margin-top: 10px;
    text-align: center;
}

button {
    margin: 5px;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    background: #c2a057;
    color: white;
}

/* Typing animation */
.typing {
    display: inline-block;
}

.typing span {
    display: inline-block;
    width: 5px;
    height: 5px;
    margin: 2px;
    background: gray;
    border-radius: 50%;
    animation: blink 1.5s infinite;
}

.typing span:nth-child(2) {
    animation-delay: 0.2s;
}
.typing span:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes blink {
    0% {opacity: 0;}
    50% {opacity: 1;}
    100% {opacity: 0;}
}
</style>

</head>
<body>

<h3 align="center">MATABOT</h3>

<div class="chat-box container" id="chat">
    <div class="bot">Halo! Pilih pertanyaan kamu!</div>
</div>

<div class="buttons">
    <button onclick="kirim('Dimana kita dapat melapor?')">Dimana kita dapat melapor?</button>
    <button onclick="kirim('Hukum pidana apa yang didapat pelaku?')">Hukum pidana apa yang didapat pelaku?</button>
    <button onclick="kirim('Apa hobi kamu?')">Apa hobi kamu?</button>
</div>

<script>
function kirim(pesan) {
    let chat = document.getElementById("chat");

    // Pesan user
    let user = document.createElement("div");
    user.className = "user";
    user.innerText = pesan;
    chat.appendChild(user);

    // Typing animation
    let typing = document.createElement("div");
    typing.className = "bot typing";
    typing.innerHTML = "<span></span><span></span><span></span>";
    chat.appendChild(typing);

    chat.scrollTop = chat.scrollHeight;

    setTimeout(() => {
        chat.removeChild(typing);

        let bot = document.createElement("div");
        bot.className = "bot";

        if (pesan === "Dimana kita dapat melapor?") {
            bot.innerText = "Disana.";
        } else if (pesan === "Hukum pidana apa yang didapat pelaku?") {
            bot.innerText = "Hukuman.";
        } else if (pesan === "Apa hobi kamu?") {
            bot.innerText = "Aku suka coding!";
        }

        chat.appendChild(bot);
        chat.scrollTop = chat.scrollHeight;
    }, 1000);
}
</script>

</body>
</html>
